AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Cribsearch API — Express on Lambda behind API Gateway (HTTP API).

# Source + build (Makefile, esbuild) live in apps/api; CodeUri points there so the
# makefile build method resolves src/ and node_modules relative to that directory.

Parameters:
  Environment:
    Type: String
    Description: Deployment stage (drives SSM parameter paths).
    AllowedValues:
      - development
      - staging
      - production
    Default: production

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        NODE_ENV: production
        ENVIRONMENT: !Ref Environment
        SERVICE_NAME: cribsearch
    Tags:
      application: cribsearch
      repository: thekhoo/cribsearch-monorepo

Resources:
  SearchDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-cribsearch-search-requests-deadletter"

  SearchQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-cribsearch-search-requests"
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SearchDeadLetterQueue.Arn
        maxReceiveCount: 3

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../../apps/api
      Handler: handler.handler
      Environment:
        Variables:
          NODE_ENV: production
          SEARCH_QUEUE_URL: !Ref SearchQueue
          CORS_ALLOWED_ORIGINS: "https://cribsearch.vercel.app,https://cribsearch.app"
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt SearchQueue.QueueName
        - SSMParameterReadPolicy:
            ParameterName: !Sub "${Environment}/cribsearch/service/*"
        - KMSDecryptPolicy:
            KeyId: alias/aws/ssm
      Events:
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  WorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: ../../apps/api
      Handler: worker.handler
      Environment:
        Variables:
          NODE_ENV: production
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt SearchQueue.QueueName
        - SSMParameterReadPolicy:
            ParameterName: !Sub "${Environment}/cribsearch/service/*"
        - KMSDecryptPolicy:
            KeyId: alias/aws/ssm
      Events:
        SearchQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt SearchQueue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 30
            ScalingConfig:
              MaximumConcurrency: 2
            FunctionResponseTypes:
              - ReportBatchItemFailures

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed HTTP API.
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  SearchQueueUrl:
    Description: URL of the Search SQS queue.
    Value: !Ref SearchQueue
