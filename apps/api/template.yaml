AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Cribsearch API — Express on Lambda behind API Gateway (HTTP API).

Parameters:
  Environment:
    Type: String
    Description: Deployment stage (drives SSM parameter paths).
    AllowedValues:
      - development
      - staging
      - production
    Default: production

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512

Resources:
  JourneyDeadLetterQueue:
    Type: AWS::SQS::Queue

  JourneyQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt JourneyDeadLetterQueue.Arn
        maxReceiveCount: 3

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: handler.handler
      Environment:
        Variables:
          NODE_ENV: production
          JOURNEY_QUEUE_URL: !Ref JourneyQueue
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt JourneyQueue.QueueName
        - SSMParameterReadPolicy:
            ParameterName: !Sub "${Environment}/cribsearch/service/supabase/*"
        - KMSDecryptPolicy:
            KeyId: alias/aws/ssm
      Events:
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  WorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: worker.handler
      Environment:
        Variables:
          NODE_ENV: production
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt JourneyQueue.QueueName
        - SSMParameterReadPolicy:
            ParameterName: !Sub "${Environment}/cribsearch/service/supabase/*"
        - KMSDecryptPolicy:
            KeyId: alias/aws/ssm
      Events:
        JourneyQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt JourneyQueue.Arn
            FunctionResponseTypes:
              - ReportBatchItemFailures

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed HTTP API.
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  JourneyQueueUrl:
    Description: URL of the Journey Search SQS queue.
    Value: !Ref JourneyQueue
