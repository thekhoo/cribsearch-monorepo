AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: HomeFinder API — Express on Lambda behind API Gateway (HTTP API).

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512

Parameters:
  SupabaseUrl:
    Type: String
    Description: Supabase project URL.
  SupabaseServiceRoleKey:
    Type: String
    NoEcho: true
    Description: Supabase service-role key (server-side only).

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        Format: cjs
        EntryPoints:
          - src/handler.ts
    Properties:
      Handler: handler.handler
      Environment:
        Variables:
          NODE_ENV: production
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SERVICE_ROLE_KEY: !Ref SupabaseServiceRoleKey
      Events:
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed HTTP API.
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
