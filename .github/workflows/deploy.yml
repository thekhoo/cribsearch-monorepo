name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.github/actions/vercel-deploy-ui/**'
              - '.github/workflows/deploy.yml'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.github/workflows/deploy.yml'

  deploy-ui:
    runs-on: ubuntu-latest
    needs: [verify, changes]
    if: ${{ needs.changes.outputs.web == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/vercel-deploy-ui
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: 'true'

  deploy-api:
    runs-on: ubuntu-latest
    needs: [verify, changes]
    if: ${{ needs.changes.outputs.api == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: thekhoo/github-actions-shared/.github/actions/sam-build-and-package@main
        id: package
        with:
          environment: production
          template-file: apps/api/template.yaml
          deployment-role-arn: arn:aws:iam::020844256789:role/github-actions-thekhoo-cribsearch-monorepo-deployment

      - uses: thekhoo/github-actions-shared/.github/actions/sam-deploy@main
        with:
          environment: production
          packaged-template-uri: ${{ steps.package.outputs.packaged-template-uri }}
          deployment-role-arn: arn:aws:iam::020844256789:role/github-actions-thekhoo-cribsearch-monorepo-deployment
          stack-name: production-cribsearch
          parameter-overrides: Environment=production
