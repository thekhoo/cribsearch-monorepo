name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  OIDC_ENTRY_ROLE: arn:aws:iam::020844256789:role/github-actions-oidc-entry-role
  CREATE_DEPLOYMENT_ROLE: arn:aws:iam::020844256789:role/github-actions-create-deployment-role
  DEPLOYMENT_ROLE: arn:aws:iam::020844256789:role/github-actions-thekhoo-cribsearch-monorepo-production-deployment

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      migrate: ${{ steps.filter.outputs.migrate }}
      pipeline: ${{ steps.filter.outputs.pipeline }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.github/actions/vercel-deploy-ui/**'
              - '.github/workflows/deploy.yml'
            api:
              - 'apps/api/**'
              - 'infrastructure/stack/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - '.github/workflows/deploy.yml'
            migrate:
              - 'apps/api/migrations/**'
              - 'apps/api/atlas.hcl'
              - 'apps/api/db/grants.sql'
              - '.github/workflows/deploy.yml'
            pipeline:
              - 'infrastructure/pipeline/**'
              - '.github/workflows/deploy.yml'

  deploy-ui:
    runs-on: ubuntu-latest
    needs: [verify, changes]
    if: ${{ needs.changes.outputs.web == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/vercel-deploy-ui
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: 'true'

  # Deploys the CI/CD pipeline stack (the deployment role itself) FIRST, so the
  # migrate and deploy-api jobs have a role to assume. Auth chain:
  #   GitHub OIDC -> github-actions-oidc-entry-role -> github-actions-create-deployment-role
  deploy-pipeline:
    runs-on: ubuntu-latest
    needs: [verify, changes]
    if: ${{ needs.changes.outputs.pipeline == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Assume OIDC entry role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ENTRY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Assume create-deployment-role (role chaining)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.CREATE_DEPLOYMENT_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-chaining: true

      - name: Deploy pipeline stack (deployment role)
        run: |
          aws cloudformation deploy \
            --region "$AWS_REGION" \
            --stack-name production-cribsearch-pipeline \
            --template-file infrastructure/pipeline/template.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides Environment=production \
            --no-fail-on-empty-changeset

  migrate:
    runs-on: ubuntu-latest
    needs: [verify, changes, deploy-pipeline]
    if: ${{ !cancelled() && needs.changes.outputs.migrate == 'true' && needs.deploy-pipeline.result != 'failure' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Assume OIDC entry role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ENTRY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Assume deployment role (role chaining)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOYMENT_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-chaining: true

      - name: Resolve DATABASE_URL from SSM
        run: |
          P=/production/cribsearch/service/postgres
          # --with-decryption is a no-op for plain String params and required for
          # SecureString params, so always pass it (host/user are SecureStrings).
          get() { aws ssm get-parameter --region "$AWS_REGION" --name "$1" --with-decryption --query Parameter.Value --output text; }
          # admin/host is the DIRECT (non-pooler) Neon endpoint — Atlas needs a
          # session connection for advisory locks / DDL, which the pooler breaks.
          HOST=$(get $P/admin/host); PORT=$(get $P/port); DB=$(get $P/database)
          USER=$(get $P/admin/user)
          PW=$(get $P/admin/password)
          enc() { jq -rn --arg s "$1" '$s|@uri'; }
          # search_path=public scopes Atlas to the public schema, so its
          # revision table lives at public.atlas_schema_revisions. Without it
          # Atlas runs in database scope and expects a dedicated
          # atlas_schema_revisions schema, which Neon does not auto-create.
          URL="postgresql://$(enc "$USER"):$(enc "$PW")@${HOST}:${PORT}/$(enc "$DB")?sslmode=require&search_path=public"
          echo "::add-mask::$PW"
          echo "::add-mask::$URL"
          echo "DATABASE_URL=$URL" >> "$GITHUB_ENV"

      - uses: ariga/setup-atlas@v0

      - name: Apply migrations
        working-directory: apps/api
        run: atlas migrate apply --env production

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply repeatable grants
        working-directory: apps/api
        run: psql "$DATABASE_URL" -v universe=production -v ON_ERROR_STOP=1 -f db/grants.sql

  deploy-api:
    runs-on: ubuntu-latest
    needs: [verify, changes, deploy-pipeline, migrate]
    if: ${{ !cancelled() && needs.changes.outputs.api == 'true' && needs.deploy-pipeline.result != 'failure' && needs.migrate.result != 'failure' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: thekhoo/github-actions-shared/.github/actions/sam-build-and-package@main
        id: package
        with:
          environment: production
          template-file: infrastructure/stack/template.yaml
          deployment-role-arn: ${{ env.DEPLOYMENT_ROLE }}

      - uses: thekhoo/github-actions-shared/.github/actions/sam-deploy@main
        with:
          environment: production
          packaged-template-uri: ${{ steps.package.outputs.packaged-template-uri }}
          deployment-role-arn: ${{ env.DEPLOYMENT_ROLE }}
          stack-name: production-cribsearch
          parameter-overrides: Environment=production
